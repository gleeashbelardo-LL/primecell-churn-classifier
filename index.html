<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --blue-pale: #b8ddf2; --blue-wash: #ddf0fa; --blue-ultra: #f0f8fd;
    --teal: #3dbccc; --teal-light: #a8e4ec; --teal-wash: #e2f6f8;
    --text: #1a2e3d; --text-mid: #3a566b; --muted: #7a9fb8;
    --label: #5a85a0; --placeholder: #a8c4d8;
    --amber: #e8900a; --amber-wash: #fff7e6; --amber-light: #fcd99a;

  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; height: 340px; background: linear-gradient(160deg, #c8e8f6 0%, #e8f6fc 40%, #f0f8fd 70%, transparent 100%); pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 200px; background: linear-gradient(0deg, #daeef8 0%, transparent 100%); pointer-events: none; z-index: 0; }
  .deco { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
  .deco-1 { width: 500px; height: 500px; top: -180px; right: -120px; background: radial-gradient(circle, rgba(110,192,232,0.3) 0%, transparent 70%); }
  .deco-2 { width: 320px; height: 320px; bottom: 60px; left: -90px; background: radial-gradient(circle, rgba(61,188,204,0.18) 0%, transparent 70%); }
  .shell { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 36px; gap: 16px; }
  .brand { display: flex; flex-direction: column; gap: 4px; }
  .brand-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--blue-mid); }
  .brand-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); line-height: 1.1; }
  .brand-title span { background: linear-gradient(90deg, var(--blue-deep), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .badge { background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid)); border-radius: 8px; padding: 6px 13px; font-family: 'DM Mono', monospace; font-size: 10px; color: #fff; letter-spacing: 0.1em; white-space: nowrap; align-self: flex-start; margin-top: 6px; box-shadow: 0 2px 12px rgba(42,127,184,0.28); }

  /* Input */
  .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 18px; box-shadow: 0 2px 20px rgba(42,127,184,0.08); }
  .input-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .input-label::before { content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(135deg, var(--blue-mid), var(--teal)); }
  textarea { width: 100%; background: var(--blue-ultra); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.65; padding: 14px 16px; resize: vertical; min-height: 140px; outline: none; transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; }
  textarea:focus { border-color: var(--blue-mid); box-shadow: 0 0 0 3px rgba(61,160,216,0.12); background: #fff; }
  textarea::placeholder { color: var(--placeholder); }
  .btn-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .btn-analyze { background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue-mid) 55%, var(--teal) 100%); color: #fff; border: none; border-radius: 10px; padding: 11px 24px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 16px rgba(42,127,184,0.3); }
  .btn-analyze:hover { opacity: 0.91; transform: translateY(-1px); }
  .btn-analyze:active { transform: translateY(0); }
  .btn-clear { background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
  .btn-clear:hover { color: var(--text-mid); border-color: var(--blue-pale); }
  .instant-badge { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--teal); background: var(--teal-wash); border: 1px solid var(--teal-light); border-radius: 12px; padding: 3px 10px; display: inline-flex; align-items: center; gap: 5px; }
  .char-count { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--placeholder); }

  /* Error */
  .error-card { display: none; background: #fff5f5; border: 1px solid #f5c8c8; border-radius: 12px; padding: 14px 18px; color: #c0392b; font-size: 13px; margin-bottom: 18px; gap: 10px; align-items: flex-start; }
  .error-card.active { display: flex; }

  /* Result card */
  .result-card { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 28px rgba(42,127,184,0.10); animation: slideUp 0.25s ease; }
  .result-card.active { display: block; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .result-stripe { height: 5px; background: linear-gradient(90deg, var(--blue-deep), var(--blue-mid), var(--teal), var(--blue-light)); }
  .result-header { padding: 18px 24px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; gap: 12px; background: linear-gradient(135deg, var(--blue-ultra), #fff 60%); flex-wrap: wrap; }
  .result-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .result-tag { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; padding: 5px 12px; border-radius: 20px; font-weight: 500; }
  .confidence-bar-wrap { display: flex; align-items: center; gap: 8px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .confidence-bar { width: 80px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--blue-mid), var(--teal)); transition: width 0.5s ease; }
  .wave-mark { font-size: 22px; opacity: 0.14; user-select: none; color: var(--blue-mid); letter-spacing: -2px; font-family: 'Syne', sans-serif; }

  .result-body { padding: 24px; display: grid; gap: 20px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); }
  .field-value.big { font-family: 'Syne', sans-serif; font-size: 21px; font-weight: 700; background: linear-gradient(90deg, var(--blue-deep), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .field-desc { font-size: 13.5px; color: var(--label); line-height: 1.6; }
  .divider { height: 1px; background: var(--border-light); }

  /* Strategy box */
  .strategy-box { background: linear-gradient(135deg, var(--teal-wash), var(--blue-wash)); border: 1.5px solid var(--teal-light); border-radius: 12px; padding: 18px 20px; }
  .strategy-label { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--teal); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
  .strategy-label::before { content: ''; display: inline-block; width: 14px; height: 2px; background: linear-gradient(90deg, var(--teal), var(--blue-mid)); border-radius: 2px; }
  .strategy-text { font-size: 14px; color: var(--text-mid); line-height: 1.7; font-weight: 500; }

  /* Canned response box — amber accent to stand out */
  .canned-box { background: var(--amber-wash); border: 1.5px solid var(--amber-light); border-radius: 12px; padding: 18px 20px; }
  .canned-label { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--amber); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
  .canned-label::before { content: ''; display: inline-block; width: 14px; height: 2px; background: linear-gradient(90deg, var(--amber), #f5c842); border-radius: 2px; }
  .canned-cards { display: flex; flex-direction: column; gap: 10px; }
  .canned-card { background: #fff; border: 1px solid var(--amber-light); border-radius: 10px; padding: 14px 16px; }
  .canned-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
  .canned-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); }
  .canned-badge { font-family: 'DM Mono', monospace; font-size: 9px; padding: 3px 8px; border-radius: 8px; white-space: nowrap; }
  .canned-badge.primary { background: rgba(232,144,10,0.12); color: var(--amber); border: 1px solid var(--amber-light); }
  .canned-badge.secondary { background: var(--blue-ultra); color: var(--blue-mid); border: 1px solid var(--blue-pale); }
  .canned-shortcode { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
  .canned-shortcode::before { content: '/'; font-weight: 700; color: var(--teal); }

  /* Status + keywords row */
  .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 13px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
  .status-pill.existing { background: rgba(42,127,184,0.08); color: var(--blue-deep); border: 1.5px solid var(--blue-pale); }
  .status-pill.new { background: rgba(61,188,204,0.1); color: var(--teal); border: 1.5px solid var(--teal-light); }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .match-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .match-pill { font-size: 11px; font-family: 'DM Mono', monospace; padding: 3px 9px; border-radius: 12px; background: rgba(42,127,184,0.08); color: var(--blue-deep); border: 1px solid var(--blue-pale); }

  /* Category tag colors */
  .cat-PRODUCT      { background: #e8eaff; color: #3a4ab8; border: 1px solid #c5caee; }
  .cat-PRICING      { background: #fff3e0; color: #a05a00; border: 1px solid #f5d89a; }
  .cat-SUBSCRIPTION { background: #e0f8ef; color: #1a7a52; border: 1px solid #96dfc0; }
  .cat-DELIVERY     { background: #fde8f0; color: #a02060; border: 1px solid #f5aaca; }
  .cat-QUALITY      { background: #f0e0ff; color: #7030a0; border: 1px solid #d4a8f0; }
  .cat-MEDICAL      { background: #ddf4ff; color: #0070a0; border: 1px solid #90d8f5; }
  .cat-COMPETITIVE  { background: #fffbd0; color: #806000; border: 1px solid #e0cc60; }
  .cat-PERSONAL     { background: #fff0e8; color: #a04020; border: 1px solid #f0b898; }
  .cat-OTHER        { background: #eff3f7; color: #4a6070; border: 1px solid #c0d0de; }

  /* History */
  .history-section { margin-top: 28px; }
  .history-title { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 10px; }
  .history-list { display: flex; flex-direction: column; gap: 7px; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .history-item:hover { border-color: var(--blue-pale); box-shadow: 0 2px 10px rgba(42,127,184,0.09); }
  .history-snippet { flex: 1; font-size: 12px; color: var(--label); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-cat { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 9px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
  .footer-note { margin-top: 28px; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; }
  .footer-note::before { content: 'ⓘ'; font-size: 12px; }

  
  /* Multiple issue blocks */
  .issue-block { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(42,127,184,0.07); margin-bottom: 14px; }
  .issue-block:last-child { margin-bottom: 0; }
  .issue-block-secondary { opacity: 0.92; }
  .issue-number { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.18em; padding: 7px 16px; background: var(--blue-ultra); border-bottom: 1px solid var(--border-light); color: var(--muted); }
  .issue-number-also { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 12px 20px; background: linear-gradient(135deg, #fff7e6, #fff3d6); border-bottom: 2px solid var(--amber-light); color: var(--amber); display: flex; align-items: center; gap: 8px; }
  .issue-number-also::before { content: '⚠'; font-size: 15px; }
  .issue-number-also { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; padding: 10px 18px; background: linear-gradient(135deg, #fff7e6, #fff3d6); border-bottom: 2px solid var(--amber-light); color: var(--amber); display: flex; align-items: center; gap: 8px; }
  .issue-number-also::before { content: '⚠'; font-size: 14px; }
  .issue-body { padding: 20px; display: grid; gap: 16px; background: #fff; }
</style>

const GROUP_CLASS = {
  "PRODUCT EXPERIENCE": "PRODUCT", "PRICING & BILLING": "PRICING",
  "SUBSCRIPTION MANAGEMENT": "SUBSCRIPTION", "DELIVERY & FULFILLMENT": "DELIVERY",
  "PRODUCT QUALITY & TRUST": "QUALITY", "MEDICAL & HEALTH": "MEDICAL",
  "COMPETITIVE & MARKET": "COMPETITIVE", "PERSONAL CIRCUMSTANCES": "PERSONAL", "OTHER": "OTHER" // kept for legacy safety
};

let history = [];

document.getElementById('emailInput').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length + ' chars';
});

function scoreAll(text) {
  // Normalize curly/smart apostrophes to straight (browser autocorrect fix)
  const lower = text.toLowerCase()
    .replace(/[‘’‚‛]/g, "'")
    .replace(/[“”„‟]/g, '"').replace(/[–—]/g, '-');
  return CHURN_DATA
    .map(cat => {
      let score = 0, matched = [];
      for (const kw of cat.keywords) {
        if (lower.includes(kw)) { score += kw.split(' ').length; matched.push(kw); }
      }
      return { cat, score, matched };
    })
    .filter(r => r.score > 0)
    .sort((a, b) => b.score - a.score);
}

function classify(text) {
  const scored = scoreAll(text);
  if (scored.length === 0) return [];
  const topScore = scored[0].score;
  const seen = new Set();
  const results = [];
  for (const r of scored) {
    if (seen.has(r.cat.group)) continue;
    if (r.score < topScore * 0.4) break;
    seen.add(r.cat.group);
    results.push({
      cat: r.cat,
      score: r.score,
      matched: r.matched,
      confidence: Math.round(Math.min(0.55 + r.score * 0.08, 0.98) * 100)
    });
    if (results.length === 3) break;
  }
  return results;
}

function analyze() {
  const text = document.getElementById('emailInput').value.trim();
  if (!text) { showError('Please paste the customer message first.'); return; }
  hideError();
  const results = classify(text);
  if (results.length === 0) {
    showNoMatch();
    return;
  }
  displayResult(results, text);
}

function renderCannedTitles(list) {
  if (!list || !list.length) return '<span style="font-size:12px;color:var(--muted)">No canned responses mapped.</span>';
  return list.map(c => `
    <div class="canned-card">
      <div class="canned-card-header">
        <div class="canned-title">${c.title}</div>
        <span class="canned-badge ${c.rank === 'best' ? 'primary' : 'secondary'}">${c.rank === 'best' ? '★ Best Match' : 'Also try'}</span>
      </div>
    </div>`).join('');
}

function renderIssueBlock(r, index, total) {
  const groupKey = GROUP_CLASS[r.cat.group] || 'OTHER';
  const isMulti = total > 1;
  return `
    <div class="issue-block${index > 0 ? ' issue-block-secondary' : ''}">
      ${isMulti ? (index === 0 ? `<div class="issue-number">Primary Issue</div>` : `<div class="issue-number-also">Also Detected — Address this too</div>`) : ''}
      <div class="result-header" style="border-radius:${isMulti ? '10px 10px 0 0' : '10px 10px 0 0'}">
        <div class="result-header-left">
          <div class="result-tag cat-${groupKey}">${r.cat.group}</div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text-mid);">${r.cat.group}</div>
        </div>
        <div class="confidence-bar-wrap">
          <span>${r.confidence}%</span>
          <div class="confidence-bar"><div class="confidence-fill" style="width:${r.confidence}%"></div></div>
          <div class="wave-mark">∿∿</div>
        </div>
      </div>
      <div class="issue-body">
        <div class="field">
          <div class="field-label">Category Name</div>
          <div class="field-value big">${r.cat.name}</div>
        </div>
        <div class="field">
          <div class="field-label">Description</div>
          <div class="field-desc">${r.cat.desc}</div>
        </div>
        <div class="divider"></div>
        <div class="strategy-box">
          <div class="strategy-label">Retention Strategy</div>
          <div class="strategy-text">${r.cat.strategy}</div>
        </div>
        <div class="canned-box">
          <div class="canned-label">Suggested Canned Responses</div>
          <div class="canned-cards">${renderCannedTitles(r.cat.canned)}</div>
        </div>
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;">
          <div class="field">
            <div class="field-label">Protocol Status</div>
            <div class="status-pill ${r.cat.status === 'EXISTING' ? 'existing' : 'new'}">
              <span class="status-dot"></span> ${r.cat.status}
            </div>
          </div>
          <div class="field" style="max-width:420px;">
            <div class="field-label">Keywords Matched</div>
            <div class="match-pills">${r.matched.length > 0
              ? r.matched.map(k => `<span class="match-pill">${k}</span>`).join('')
              : '<span style="font-size:12px;color:var(--muted)">General cancellation intent</span>'
            }</div>
          </div>
        </div>
      </div>
    </div>`;
}

function displayResult(results, snippet) {
  document.getElementById('resultCard').innerHTML = results.map((r, i) => renderIssueBlock(r, i, results.length)).join('');
  document.getElementById('resultCard').classList.add('active');

  history.unshift({ snippet: snippet.substring(0, 80), results });
  if (history.length > 5) history.pop();
  renderHistory();
}

function renderHistory() {
  if (!history.length) return;
  document.getElementById('historySection').style.display = 'block';
  document.getElementById('historyList').innerHTML = history.map((h, i) => {
    const groupKey = GROUP_CLASS[h.results[0].cat.group] || 'OTHER';
    const extra = h.results.length > 1 ? ` <span style="font-size:10px;color:var(--muted)">+${h.results.length - 1} more</span>` : '';
    return `
      <div class="history-item" onclick="restoreHistory(${i})">
        <div class="history-snippet">"${h.snippet}${h.snippet.length >= 80 ? '...' : ''}"</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="history-cat result-tag cat-${groupKey}">${h.results[0].cat.group}</div>${extra}
        </div>
      </div>`;
  }).join('');
}

function restoreHistory(i) {
  const h = history[i];
  document.getElementById('emailInput').value = h.snippet;
  displayResult(h.results, h.snippet);
}

function showNoMatch() {
  document.getElementById('resultCard').innerHTML = `
    <div style="padding:28px 24px;text-align:center;color:var(--muted);">
      <div style="font-size:28px;margin-bottom:10px;">🤔</div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text-mid);margin-bottom:6px;">No specific reason detected</div>
      <div style="font-size:13px;line-height:1.6;">No keywords matched. Use your judgment to probe the customer's reason before proceeding.</div>
    </div>`;
  document.getElementById('resultCard').classList.add('active');
}


function clearAll() {
  document.getElementById('emailInput').value = '';
  document.getElementById('charCount').textContent = '0 chars';
  document.getElementById('resultCard').classList.remove('active');
  document.getElementById('resultCard').innerHTML = '';
  hideError();
}
function showError(msg) { document.getElementById('errorMsg').textContent = msg; document.getElementById('errorCard').classList.add('active'); }
function hideError()    { document.getElementById('errorCard').classList.remove('active'); }
</script>
</body>
</html>
